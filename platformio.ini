[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
lib_deps =
    bblanchon/ArduinoJson@6.18.5
build_flags =
    -DENABLE_OTA
    -DENABLE_WIFI_MANAGER
    -std=gnu++17

# Phase 7.2: Native test environment (runs on host, no hardware needed)
[env:native]
platform = native
build_flags =
    -std=gnu++17
    -DUNIT_TEST
lib_deps =
    bblanchon/ArduinoJson@6.18.5
test_build_src_files =
    test/test_pet_statemachine.cpp
    test/test_spiffs_migration.cpp
test_filter = test_*

