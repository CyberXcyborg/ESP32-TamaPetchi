; ============================================================
; ESP32-TamaPetchi v2.0 — PlatformIO Configuration
; Target: ESP32-S3-DevKitC-1 (8MB PSRAM)
; Framework: ESP-IDF + Arduino hybrid
; ============================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- PSRAM Configuration ---
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.f_flash = 80000000L

; --- Partition Table ---
board_build.partitions = partitions_v2.csv

; --- LittleFS (replaces SPIFFS) ---
board_build.filesystem = littlefs

; --- Build Flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; v2.0 Feature Flags
    -DENABLE_LVGL
    -DENABLE_TOUCH
    -DENABLE_I2S_AUDIO
    -DENABLE_SPRITES
    -DENABLE_BLE
    ; Disable v1.x features not yet ported
    -DDISABLE_OLED
    -DDISABLE_IR_REMOTE
    -DDISABLE_MQTT
    -DDISABLE_NOTIFICATIONS
    -DDISABLE_WEATHER
    -DDISABLE_GAMES
    -DDISABLE_MUSIC
    -DDISABLE_BUTTONS
    -DDISABLE_COMMUNITY
    -DDISABLE_PROVISIONING
    -DDISABLE_PLUGINS
    -DDISABLE_VOICE_CONTROL
    -DDISABLE_ANALYTICS
    -DDISABLE_SOUND_PACKS
    -DDISABLE_PET_AI
    -DDISABLE_BACKUP
    -DDISABLE_LINEAGE
    -DDISABLE_ACCESSIBILITY
    -DDISABLE_I18N
    -DDISABLE_OTA_ROLLBACK
    -std=gnu++17

; --- Libraries ---
lib_deps =
    bblanchon/ArduinoJson@6.18.5
    lvgl/lvgl@8.3.11
    bodmer/TFT_eSPI@2.5.43
    h2zero/NimBLE-Arduino@2.5.0
    ; WiFi, WebServer from arduino-esp32 framework

; --- Flash Size Monitoring ---
extra_scripts = pre:tools/check_flash.py

[env:native]
platform = native
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -Itest
    -Isrc
lib_deps =
    bblanchon/ArduinoJson@6.18.5
build_src_filter = +<src/DataExport.cpp> +<src/DayNightTheme.cpp> +<src/DisplayDriver.cpp> +<src/HAL_v2.cpp> +<src/main_v2.cpp> +<src/Pet_v2.cpp> +<src/PluginV2.cpp> +<src/Storage_v2.cpp> +<src/VoicePrompts.cpp> +<src/WebHandlers.cpp> +<test/Arduino.cpp> +<test/stubs.cpp> +<test/test_impls.cpp> +<test/test_pet_statemachine.cpp> +<test/test_spiffs_migration.cpp> +<test/test_achievements.cpp> +<test/test_lineage.cpp> +<test/test_stats.cpp> +<test/test_accessibility.cpp> +<test/test_backup.cpp> +<test/test_hal.cpp> +<test/test_provisioning.cpp> +<test/test_power.cpp> +<test/test_ota_delta.cpp> +<test/HAL_Native.cpp> +<test/OTA_Delta_Native.cpp> +<test/Phase24_Native.cpp> +<test/test_voice_prompts.cpp> +<test/test_data_export.cpp> +<test/test_day_night.cpp> +<test/test_plugin_v2.cpp>
test_filter = test_*
