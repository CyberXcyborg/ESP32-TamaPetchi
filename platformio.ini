; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv
lib_deps = 
	bblanchon/ArduinoJson@6.18.5
	knolleary/PubSubClient@2.8
	links2004/WebSockets@2.4.1
	lvgl/lvgl@9.5.0
	bodmer/TFT_eSPI@2.5.43
	h2zero/NimBLE-Arduino@2.5.0
	adafruit/Adafruit PN532@1.3.4
build_flags =
    -DENABLE_OTA
    -DENABLE_WIFI_MANAGER
    -DLVGL_AVAILABLE
    -DLV_CONF_PATH=\"${PROJECT_SRC_DIR}/lv_conf.h\"
    -std=gnu++17

[env:native]
platform = native
build_flags = 
	-std=gnu++17
	-DUNIT_TEST
	-Itest
	-Isrc
lib_deps = 
	bblanchon/ArduinoJson@6.18.5
	adafruit/Adafruit PN532@1.3.4
build_src_filter = 
	+<test/Arduino.cpp>
	+<test/stubs.cpp>
	+<test/test_impls.cpp>
	+<test/test_pet_statemachine.cpp>
	+<test/test_spiffs_migration.cpp>
	+<test/test_achievements.cpp>
	+<test/test_lineage.cpp>
	+<test/test_stats.cpp>
	+<test/test_accessibility.cpp>
	+<test/test_backup.cpp>
	+<test/test_hal.cpp>
	+<test/test_provisioning.cpp>
	+<test/test_power.cpp>
	+<test/test_ota_delta.cpp>
	+<test/HAL_Native.cpp>
	+<test/OTA_Delta_Native.cpp>
	+<test/test_spriteloader.cpp>
	+<test/test_animation.cpp>
	+<test/test_screenmanager.cpp>
	+<test/test_migrated_screens.cpp>
	+<test/test_phase21.cpp>
	+<test/test_phase22.cpp>
	+<test/test_phase22_5.cpp>
	+<test/test_phase23.cpp>
	+<test/Phase23_Native.cpp>
	+<test/BLE_NFC_Native.cpp>
	+<src/*>
	-<src/BLEManager.cpp>
	-<src/BLEProtocol.cpp>
	-<src/BLEDiscovery.cpp>
	-<src/NFCManager.cpp>
test_filter = test_*
